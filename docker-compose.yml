version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: articles_db
    environment:
      POSTGRES_DB: articles_db
      POSTGRES_USER: articles_user
      POSTGRES_PASSWORD: articles_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U articles_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - articles_network

  redis:
    image: redis:7-alpine
    container_name: articles_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - articles_network

  web:
    build: .
    container_name: articles_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://articles_user:articles_password@db:5432/articles_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - articles_network

  celery-worker:
    build: .
    container_name: articles_celery_worker
    command: celery -A config.celery worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://articles_user:articles_password@db:5432/articles_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - db
      - redis
      - web
    networks:
      - articles_network

  celery-beat:
    build: .
    container_name: articles_celery_beat
    command: celery -A config.celery beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://articles_user:articles_password@db:5432/articles_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - db
      - redis
      - web
    networks:
      - articles_network

volumes:
  postgres_data:
  redis_data:

networks:
  articles_network:
    driver: bridge